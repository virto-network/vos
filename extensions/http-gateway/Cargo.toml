[package]
name = "http-gateway"
description = "HTTP gateway extension — exposes other actors over GET/POST routes"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# `bin` enables the cdylib's `vos_extension_*` extern-fn exports.
# `extension` is matched by `#[actor]` to emit the transport glue
# (`vos_extension_conn_new` etc.). Both default-on so a plain
# `cargo build` produces a loadable extension .so. Cross-actor lib
# deps disable default features.
default = ["bin", "extension"]
bin = []
extension = []

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "extension", "wasm"))']

[lib]
crate-type = ["rlib", "cdylib"]

# The gateway is a TRANSPORT-mode extension: the host owns the listener +
# accept loop and drives one `handle_connection` per connection on its
# cooperative executor, and a hand-written HTTP/1.1 parser sits on the
# plaintext byte stream. HTTP/2 and HTTP/3 are not supported; the deps are
# just codecs + types.
[dependencies]
vos = { path = "../../vos", default-features = false, features = ["extension"] }
# Battle-tested zero-alloc HTTP/1.x request-line + header parser (the same
# one hyper uses). We drive it incrementally off the byte stream and keep
# body framing (Content-Length) + keep-alive ourselves — see http1.rs.
httparse = "1"
# The standard `http` crate — types only (Method, StatusCode, Uri,
# HeaderMap, Request/Response). No I/O or runtime; `httparse` parses the
# wire bytes, then we fill an `http::Request` from them.
http = "1"
serde_json = "1"
serde_urlencoded = "0.7"
# Constant-time byte comparison for bearer-token checks.
subtle = "2"

[dev-dependencies]
# tests/dispatch_e2e.rs drives the gateway via VosNode's host APIs
# (register_extension, run_forever, shutdown), all behind vos's
# `std` feature. The cdylib build keeps default-features off so the
# .so stays lean; this dev-dep brings std + storage + http back in
# just for the test binary.
vos = { path = "../../vos", default-features = false, features = ["extension", "std", "network", "storage", "http"] }
