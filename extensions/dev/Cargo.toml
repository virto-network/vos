[package]
name = "dev-extension"
description = "Dev extension — compiles + publishes PVM actors from a dev-project actor's tree"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# `bin` enables the cdylib's `vos_extension_*` extern-fn exports.
# `extension` is matched by `service_main!` to emit the host ABI
# glue. Both default-on so a plain `cargo build` produces a
# loadable extension .so.
default = ["bin", "extension"]
bin = []
extension = []

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "extension", "wasm"))']

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
vos = { path = "../../vos", default-features = false, features = ["extension"] }
# Wire types shared with the dev-project PVM actor (`CommitNode`,
# `BlobObject`, `HashResult`, intent tags, status codes). The
# `default-features = false` strips dev-project's `bin` feature so
# the host-target rlib build doesn't drag in PVM entry-point glue.
dev-project = { path = "../../actors/dev-project", default-features = false }
# Drives the RISC-V ELF → PVM blob conversion after cargo
# produces the riscv64em-javm target binary.
grey-transpiler = { git = "https://github.com/olanod/jar.git", rev = "ba1276acffa3e84f33cb90491e389280fd070a48", version = "0.1" }
# Round-trips `BlobKind::RustAst` blobs back to text. Path dep
# since dev-ast lives in its own workspace under the dev-project
# tree — `version` mirrors what the crate self-declares.
dev-ast = { path = "../../actors/dev-project/dev-ast", version = "0.1.0" }
tempfile = "3"

[dev-dependencies]
# The e2e test drives a real `vosx space up` daemon and dials it
# as a libp2p client via vos's host APIs. Pulling vos back in with
# std + network + storage gives us the same primitives DaemonClient
# uses inside vosx — we can't import vosx's lib because it's a
# binary crate.
vos = { path = "../../vos", default-features = false, features = ["extension", "std", "network", "storage"] }
libp2p = { version = "0.56", default-features = false, features = ["tcp", "yamux", "noise", "tokio", "macros", "ping", "identify", "request-response", "gossipsub"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
# Hex-encode commit hashes into the dynamic-dispatch args the e2e now
# uses (`commit=<hex>`, `theirs=<hex>`, `build_commit=<hex>`) since the
# typed `vosx dev` verb was retired in favour of dynamic dispatch.
hex = "0.4"
# Used by the AST-parity test to produce the canonical-text form
# of the counter source and round it through `put_blob_ast`.
dev-ast = { path = "../../actors/dev-project/dev-ast", version = "0.1.0" }
