# Per-target rustflags so the source compiles as a no_std riscv64 PVM
# actor. `-Zcrate-attr` injects the crate-level attributes the user
# shouldn't have to write.

[target.riscv64em-javm]
rustflags = [
    "-Zunstable-options",
    "-Zcrate-attr=no_std",
    "-Zcrate-attr=no_main",
    "-Aduplicate-macro-attributes",
    "-Aunused-attributes",
]

# `cargo actor` is the build command — it produces the riscv64 PVM
# actor ELF, the crate's only deployment artifact. Plain `cargo
# build`/`check`/`test` default to the host target and compile the
# crate as std for the unit tests and the typed Ref.
[alias]
actor = "rustc --lib --crate-type bin -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem --release --target riscv64em-javm.json"

[unstable]
json-target-spec = true
