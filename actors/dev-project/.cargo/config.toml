# Per-target rustflags so the same source compiles for all three
# build flavors. `-Zcrate-attr` injects crate-level attributes the
# user shouldn't have to write.

[target.riscv64em-javm]
rustflags = [
    "-Zunstable-options",
    "-Zcrate-attr=no_std",
    "-Zcrate-attr=no_main",
    "-Aduplicate-macro-attributes",
    "-Aunused-attributes",
]

[target.wasm32-unknown-unknown]
rustflags = [
    "-Zunstable-options",
    "-Zcrate-attr=no_std",
    "-Aunused-attributes",
]

# Aliases mirror the rest of the actors/ tree. `cargo actor` is
# the canonical way to produce the riscv64 ELF; `cargo worker`
# produces the host-target rlib/cdylib (useful for cross-actor
# host deps like the dev extension); `cargo wasm` the wasm32
# cdylib. Plain `cargo build` defaults to host — useful for
# `cargo test` and `cargo check`.
[alias]
actor = "rustc --lib --crate-type bin -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem --release --target riscv64em-javm.json"
worker = "build --release --no-default-features"
wasm = "build --release --no-default-features --target wasm32-unknown-unknown"

[unstable]
json-target-spec = true
