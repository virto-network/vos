[workspace]
resolver = "3"
members = [
    "crates/*",
    "crates/zkpvm-air-column/air-column-derive",
    "examples/workers/*",
]
exclude = [
    "examples/agents/*",
    "examples/actors/*",
    "examples/actors/crdt-counter",
    "examples/wasm/*",
    # Built-in PVM actors (riscv64em-javm target) live alongside
    # the workspace crates but build with their own toolchain.
    # Listing the directory itself keeps `crates/*` from picking
    # it up as a workspace member.
    "crates/actors",
    "crates/actors/registry",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Internal crates
zkpvm-air-column = { path = "crates/zkpvm-air-column" }
zkpvm-air-column-derive = { path = "crates/zkpvm-air-column/air-column-derive" }
zkpvm-core = { path = "crates/zkpvm-core" }
zkpvm-trace = { path = "crates/zkpvm-trace" }
zkpvm-machine = { path = "crates/zkpvm-machine" }
zkpvm-verifier = { path = "crates/zkpvm-verifier" }
javm = { git = "ssh://git@github.com/olanod/jar.git", rev = "6db1168" }

# Stwo (pinned to same rev as Nexus zkVM)
stwo = { git = "https://github.com/starkware-libs/stwo", rev = "0790eba", features = [
    "std",
    "prover",
    "parallel",
] }
stwo-constraint-framework = { git = "https://github.com/starkware-libs/stwo", rev = "0790eba", features = [
    "std",
    "prover",
    "parallel",
] }

# Common deps
num-traits = "0.2"
serde = { version = "1", features = ["derive"] }
rayon = "1.10"
impl-trait-for-tuples = "0.2.2"
