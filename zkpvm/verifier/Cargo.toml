[package]
name = "zkpvm-verifier"
edition.workspace = true
version.workspace = true
license.workspace = true

[features]
# Native-recursion Stage-0 (P5.0): verify proofs committed under the
# Poseidon2-M31 PCS (M31-algebraic commit + Fiat-Shamir). Forwards to zkpvm's
# `poseidon2-channel`; the `CommitmentHash` / channel types flip to the
# `recursion_pcs` aliases. Off by default — production verifies Blake2s proofs.
poseidon2-channel = ["zkpvm/poseidon2-channel"]

[dependencies]
zkpvm = { path = "..", default-features = false }
stwo = { workspace = true }
stwo-constraint-framework = { workspace = true }
# De-featured like zkpvm's own pin (see the comment there): the workspace pin
# carries default features (= std), which would drag libstd into a no_std
# runtime that links this verifier.
num-traits = { version = "0.2", default-features = false }

[dev-dependencies]
javm = { workspace = true }
zkpvm = { path = ".." } # tests use the prover too
bincode = "1"          # on-wire proof serialization (size measurement)
