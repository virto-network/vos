[package]
name = "vwb-gen"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
# Full zkpvm (default features = prover) — this member is native-only.
zkpvm = { path = "../.." }
# Native cross-check verify uses the exact same code path the wasm build runs.
zkpvm-verifier = { path = "../../verifier" }
# Same pin as the vos workspace so the git cache is reused.
javm = { git = "https://github.com/olanod/jar.git", rev = "cd8ad8449c5f9ccf78dcfdf743141cf98464c2fe" }
postcard = { version = "1", features = ["alloc"] }

[features]
# Diagnostic pass-through: `cargo build -p vwb-gen --features debug-internals`
# lets `binding` pinpoint chip/row/constraint on ConstraintsNotSatisfied.
debug-internals = ["zkpvm/debug-internals"]
