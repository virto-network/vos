# Clerk demo recipe — clerk-ledger + clerk-bridge behind the
# http-gateway, single node, Local consistency. Paths are relative to
# this acceptance directory.
#
#   cargo build -p http-gateway -p vosx          # gateway is DEBUG only — release LTO hangs
#   just build-clerk-ledger && just build-clerk-bridge
#   ./target/debug/vosx space new clerk-demo --recipe tests/acceptance/clerk/space-clerk-demo.toml
#   RUST_LOG=warn ./target/debug/vosx space up clerk-demo &      # SIGTERM to stop
#
#   curl -s http://127.0.0.1:18090/__schema                 # ["clerk-bridge","clerk-ledger"]
#   curl -s -X POST http://127.0.0.1:18090/clerk-ledger/ping
#   curl -s -X POST http://127.0.0.1:18090/clerk-ledger/bootstrap \
#     -d '{"journal_id":"00112233445566778899aabbccddeeff",
#          "registrar_pubkey":"1111111111111111111111111111111111111111111111111111111111111111",
#          "code":0}'                                       # "00" = Status::Ok
#   curl -s http://127.0.0.1:18090/clerk-ledger/journal_id   # round-trips the hex
#
# Vec<u8> handler args are hex strings (bootstrap wants a 16-byte
# journal_id + 32-byte registrar_pubkey); byte replies render as hex too.
space = "clerk-demo"
version = "0.1.0"

[[agent]]
name = "clerk-ledger"
# Raft from genesis (the correct federation posture — the monotone locality
# seal forbids widening Local -> Raft later). A single node self-elects, so
# this drives fine from the gateway; the full HA story is the multi-node
# bank manifests (tests/acceptance/clerk/space-bank-a.toml).
path = "../../../actors/clerk-ledger/target/riscv64em-javm/release/clerk_ledger.elf"
consistency = "raft"

[[agent]]
name = "clerk-bridge"
# Local + network_reachable: the bridge holds the F2 anchor, dedup set, and
# per-window receiver-term sums (must persist), and answers peer banks over
# the network. NOT Ephemeral.
path = "../../../actors/clerk-bridge/target/riscv64em-javm/release/clerk_bridge.elf"
consistency = "local"
network_reachable = true

[[extension]]
name = "gateway"
path = "../../../target/debug/libhttp_gateway.so"
init = { bind_addr = "127.0.0.1", port = 18090 }
