# Cross-node CRDT demo — host A's genesis recipe.
#
# The admin installs the crdt-counter agent from this recipe; a second
# node joins with an invite token and syncs the agent (no per-node
# recipe). The counter's `on_start` inc fires once on A and the event
# gossips to the joiner's replica so both converge — each event carries a
# unique (origin, seq); see `vos::effect_log::CrdtEvent`.
#
# Easiest end-to-end recipe:
#
#   just demo-crdt-procs
#
# (creates two isolated XDG dirs, invites B from A, reaps them.)
# Step-by-step:
#
#   vosx space new a --recipe tests/fixtures/legacy-v1/space-crdt-a.toml
#   vosx space up a --listen /ip4/127.0.0.1/tcp/4811 &     # genesis-applies
#   vosx space invite a --role member --bootnode <A's bootnode hint>
#   # … then on the second node:  vosx space up "<the vos1… token>" &
#
# `replication_id` defaults to "auto" = `blake2b(name || 0 || blob)`, so
# the synced agent shares a CRDT group across nodes.

space = "crdt-demo"
version = "0.1.0"

[[agent]]
name = "counter"
path = "actors/crdt-counter/target/riscv64em-javm/release/crdt_counter.elf"
consistency = "crdt"
on_start = [
  { msg = "inc" },
]
