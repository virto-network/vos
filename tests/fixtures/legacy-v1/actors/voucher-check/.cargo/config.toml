[build]
target = "riscv64em-javm.json"
rustflags = [
    "-Zunstable-options",
    "-Zcrate-attr=no_std",
    "-Zcrate-attr=no_main",
    "-Aduplicate-macro-attributes",
    "-Aunused-attributes",
    # Reproducible builds: remap the build directory (the worktree checkout
    # path) to a fixed virtual root so `file!()` panic locations + debuginfo
    # don't bake the absolute path into the ELF — keeping the program bytes
    # (and the prover's pinned commitment over them) stable across checkouts.
    "-Zremap-cwd-prefix=.",
]

[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
json-target-spec = true
