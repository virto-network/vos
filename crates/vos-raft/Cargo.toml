[package]
name = "vos-raft"
description = "Transport- and storage-agnostic Raft consensus core. no_std + alloc compatible (with the `std` feature off)."
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["std"]
# `std` enables:
#  - The `Worker` / `WorkerHandle` async loop (uses
#    `futures-channel::mpsc` for the inbox, which requires std).
#  - `StdClock` — per-`Delay` thread-spawning timer, robust under
#    heavy `cargo test` parallelism.
#  - `StdRng` — entropy from the system clock + pid.
#  - The `Worker::spawn` helper that runs the worker future on a
#    dedicated thread via `futures-executor`.
#
# Without `std`, only the pure data types compile (`Config`,
# `LogEntry`, `Meta`, `Role`, `RPC` structs, `Storage` /
# `Transport` traits, `MemStorage`). An embedded host implements
# the worker driver itself against its async runtime.
std = ["dep:futures-channel", "dep:futures-util", "dep:futures-executor"]

[dependencies]
# Channels + `select!` + `FuturesUnordered` — only used by the
# std-feature worker. Optional so a true no_std build pulls in
# nothing beyond core + alloc.
futures-channel = { version = "0.3", optional = true, default-features = false, features = ["alloc", "std"] }
futures-util = { version = "0.3", optional = true, default-features = false, features = ["alloc", "async-await-macro", "std"] }
futures-executor = { version = "0.3", optional = true, default-features = false, features = ["std"] }

[dev-dependencies]
# Property-based testing — randomly generated AppendEntries /
# RequestVote sequences vs. Raft safety invariants.
proptest = { version = "1", default-features = false, features = ["std", "bit-set"] }
