[package]
name = "registry"
description = "Hyperspace service registry — shared wire types + host-side client for a CRDT-replicated name → ServiceId directory"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["std"]
# Off when actor crates depend on this for the wire types only
# — they live in no_std + alloc. Today this only flips
# blake2b_simd's std feature; future host-only sugar (if any)
# would gate behind it too. The host-side `Client` lives in
# the separate `registry-client` crate to avoid a vos→registry→vos
# build cycle.
std = ["blake2b_simd/std"]

[dependencies]
rkyv = { version = "0.8", default-features = false, features = ["alloc"] }
blake2b_simd = { version = "1", default-features = false }
