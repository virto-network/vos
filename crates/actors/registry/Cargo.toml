[workspace]

[package]
name = "registry"
version = "0.1.0"
edition = "2024"

[features]
# Default off so the riscv64 actor build stays minimal — no
# `Client`, no `replication_id`. Hosts (vosx, tests) enable
# `host` to get the typed wrapper and the CRDT group-id
# derivation. The `host` name is deliberate: this is about
# being on the driver side of the actor, not about std vs
# no_std (the actor is also no_std). Once blake2b becomes a
# host ecall the only host-side helper using blake2b_simd
# (`replication_id`) will route through that, and the dep can
# go away entirely.
default = []
host = ["dep:blake2b_simd"]

[lib]
name = "registry"
path = "src/lib.rs"

[[bin]]
name = "registry-actor"
path = "src/main.rs"

[dependencies]
vos = { path = "../../vos", default-features = false, features = ["macros", "service"] }
blake2b_simd = { version = "1", optional = true, default-features = false, features = ["std"] }

[profile.release]
opt-level = "s"
lto = true
panic = "abort"
