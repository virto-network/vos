[package]
name = "vos"
description = "VOS runtime — JAR-aligned PVM executor for VOS actors"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["std", "http"]
std = ["dep:javm", "dep:grey-transpiler", "dep:toml", "dep:serde", "dep:blake2b_simd", "dep:pollster", "dep:tracing-subscriber", "dep:clap", "dep:libloading"]
macros = ["dep:vos-macros"]
pvm = []
service = ["pvm"]
worker = ["macros"]
wasm = ["macros"]
# Enables native HTTP fulfillment (EFFECT_FETCH) in the worker host.
http = ["dep:ureq"]

[dependencies]
vos-macros = { path = "../vos-macros", optional = true }
rkyv = { version = "0.8", default-features = false, features = ["alloc"] }

# std-only: PVM runtime and vosx binary dependencies
javm = { path = "../../../../jar/jar/grey/crates/javm", optional = true }
grey-transpiler = { path = "../../../../jar/jar/grey/crates/grey-transpiler", optional = true }
toml = { version = "0.8", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
blake2b_simd = { version = "1", optional = true }
pollster = { version = "0.3", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
clap = { version = "4", features = ["derive"], optional = true }
libloading = { version = "0.8", optional = true }
ureq = { version = "2", optional = true, default-features = false, features = ["tls"] }

[[bin]]
name = "vosx"
path = "src/bin/vosx.rs"
required-features = ["std"]
