[package]
name = "vos"
description = "VOS runtime — JAR-aligned PVM executor for VOS actors"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["std", "http", "storage", "network"]
std = ["dep:javm", "dep:grey-transpiler", "dep:toml", "dep:serde", "dep:blake2b_simd", "dep:pollster", "dep:tracing", "dep:tracing-subscriber", "dep:clap", "dep:libloading"]
macros = ["dep:vos-macros"]
pvm = []
service = ["pvm"]
worker = ["macros"]
wasm = ["macros"]
# WASM bootstrap: provides global allocator (dlmalloc) and panic
# handler so the actor crate just needs `#![no_std]` and `use vos::*`.
wasm-bootstrap = ["wasm", "dep:dlmalloc"]
# Enables native HTTP fulfillment (EFFECT_FETCH) in the worker host.
http = ["dep:ureq"]
# Enables redb-backed worker state persistence in the worker host.
storage = ["dep:redb", "dep:merkle-crdt", "dep:futures-executor", "dep:futures-channel", "dep:vos-raft"]
# Enables the libp2p-backed networking layer (peer transport, identity,
# discovery). Pulls a substantial dep tree (libp2p + tokio runtime),
# so it's opt-in. Hosts that want cross-node spaces enable it; bare
# single-node runs (workers, no_std actors) don't need it.
network = ["std", "dep:libp2p", "dep:tokio", "dep:async-trait"]

[dependencies]
vos-macros = { path = "../vos-macros", optional = true }
vos-raft = { path = "../vos-raft", default-features = false, features = ["std"], optional = true }
rkyv = { version = "0.8", default-features = false, features = ["alloc", "bytecheck"] }
# Logging facade — re-exported as `vos::log` and pulled into
# `vos::prelude::*`. `default-features = false` keeps it usable
# in no_std actor / wasm guests; the std-side host code can use
# the same facade and bridge to tracing if it wants.
log = { version = "0.4", default-features = false }

# std-only: PVM runtime and vosx binary dependencies
javm = { git = "https://github.com/olanod/jar.git", rev = "e8861917c03d8f277a03ad8c079acf95c531b3d6", optional = true }
grey-transpiler = { git = "https://github.com/olanod/jar.git", rev = "e8861917c03d8f277a03ad8c079acf95c531b3d6", optional = true }
toml = { version = "0.8", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
blake2b_simd = { version = "1", optional = true }
pollster = { version = "0.3", optional = true }
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
clap = { version = "4", features = ["derive"], optional = true }
libloading = { version = "0.8", optional = true }
ureq = { version = "2", optional = true, default-features = false, features = ["tls"] }
dlmalloc = { version = "0.2", optional = true, features = ["global"] }
redb = { version = "2", optional = true }
merkle-crdt = { path = "../merkle-crdt", features = ["redb"], optional = true }
libp2p = { version = "0.56", default-features = false, features = ["tcp", "yamux", "noise", "tokio", "mdns", "macros", "ping", "identify", "request-response", "gossipsub"], optional = true }
tokio = { version = "1", default-features = false, features = ["rt", "rt-multi-thread", "sync", "macros", "time", "fs"], optional = true }
async-trait = { version = "0.1", optional = true }
# Drives vos-raft's async Storage / Transport futures from inside
# the existing sync Network::set_raft_handler / RaftCommit code
# paths. Std-only — gated behind the `storage` feature so no_std
# actor builds (default-features = false) don't drag std into the
# riscv guest.
futures-executor = { version = "0.3", default-features = false, features = ["std"], optional = true }
futures-channel = { version = "0.3", default-features = false, features = ["alloc", "std"], optional = true }

[dev-dependencies]
# Tests use the typed `RegistryRef` (always emitted) and the
# host-only `replication_id` helper (gated on registry's `host`
# feature). Cargo allows this dev-dep cycle (registry → vos)
# because dev-deps don't participate in the regular dep graph;
# only test/example builds activate it.
registry = { path = "../actors/registry", default-features = false, features = ["host"] }
# `default-features = false` so the `bin` feature stays off — host
# tests just need the `RegistryRef` / `CrdtCounterRef` typed surface
# from the rlib, not the cdylib glue. The vos build for these dev-deps
# pulls vos's own default features (std + http + storage + network)
# via the test crate's own resolution so the integration tests can
# `use vos::runtime::*` etc.
crdt-counter = { path = "../../examples/actors/crdt-counter", default-features = false }
# Used by a single robustness test that hand-corrupts the
# actor's persisted state to simulate schema drift.
redb = "2"
