[package]
name = "vos"
description = "VOS runtime — JAR-aligned PVM executor for VOS actors"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["std"]
std = ["dep:javm", "dep:grey-transpiler", "dep:toml", "dep:serde", "dep:blake2b_simd", "dep:pollster", "dep:tracing-subscriber"]
macros = ["dep:vos-macros"]
pvm = ["vos-abi/pvm"]
service = ["pvm", "vos-abi/service"]

[dependencies]
vos-abi = { path = "../vos-abi" }
vos-macros = { path = "../vos-macros", optional = true }
rkyv = { version = "0.8", default-features = false, features = ["alloc"] }

# std-only: PVM runtime and vosx binary dependencies
javm = { path = "../../../../jar/jar/grey/crates/javm", optional = true }
grey-transpiler = { path = "../../../../jar/jar/grey/crates/grey-transpiler", optional = true }
toml = { version = "0.8", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
blake2b_simd = { version = "1", optional = true }
pollster = { version = "0.3", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }

[[bin]]
name = "vosx"
path = "src/bin/vosx.rs"
required-features = ["std"]
