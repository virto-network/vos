[package]
name = "zkpvm-precompiles"
edition.workspace = true
version.workspace = true
license.workspace = true
description = "Guest-side shims for zkpvm precompile ECALLs.  Users (cipher-clerk, vos actors, etc.) link this to call into chip-accelerated host computations via the JAM ECALL ABI.  On host (non-riscv64) builds the shims fall through to native crypto so the same code path runs in tests."

[features]
# Default: dalek-backed types and operators.  On riscv64 targets the
# `Mul<&RistrettoPoint>` impls dispatch via inline asm `ecalli 200`;
# on other targets they fall through to dalek's native scalar mult.
# In both modes the *types* are dalek's types (Scalar, RistrettoPoint),
# so call sites read identically to plain dalek code.
default = []

[dependencies]
# Always pulled in — the shim re-exports `Scalar`, `RistrettoPoint`
# etc. as thin newtypes over dalek's, so call sites can stay
# operator-shaped (`&v * G + b * H`).  The on-target path replaces
# the multiplication with an ECALL but keeps the type signatures.
curve25519-dalek = { version = "4.1", default-features = false, features = ["alloc", "precomputed-tables"] }

