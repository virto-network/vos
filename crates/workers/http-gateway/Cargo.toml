[package]
name = "http-gateway"
description = "HTTP gateway worker — exposes other actors over GET/POST routes"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
# `bin` enables the cdylib's `vos_worker_*` extern-fn exports.
# Default-on so a plain `cargo build` produces a loadable
# worker .so. Cross-actor lib deps disable default features.
default = ["bin"]
bin = []

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "worker", "wasm"))']

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
vos = { path = "../../vos", default-features = false, features = ["worker"] }
# Connection-side I/O runs on tokio so the worker can accept many
# clients concurrently. Dispatch through `ctx.ask` is still serial
# (the actor's `ctx` is single-threaded), but accept/parse/write
# parallelizes across the runtime's worker tasks.
tokio = { version = "1", default-features = false, features = ["rt", "net", "io-util", "sync", "time", "macros"] }
# HTTP layer. hyper handles parsing, serialization, keep-alive, h2c
# multiplexing — none of which we want to maintain by hand. The h2
# feature also enables h2c (cleartext) for non-TLS clients with
# prior-knowledge negotiation. HTTP/3 will live behind a feature
# gate (h3 + quinn + rustls) in a follow-up.
hyper = { version = "1", default-features = false, features = ["server", "http1", "http2"] }
hyper-util = { version = "0.1", default-features = false, features = ["server", "server-auto", "http1", "http2", "tokio"] }
http-body-util = "0.1"
bytes = "1"
