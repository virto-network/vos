# Cross-node CRDT demo, host A.
#
# Pair with `space-crdt-b.toml` running in another vosx process.
# Each host kicks the local crdt-counter replica with one `inc()`
# on startup. After convergence both replicas should report
# count = 2 (one increment per replica, both surviving the merge
# because the runtime stamps each event with a unique
# (origin, seq) pair — see `vos::effect_log::CrdtEvent`).
#
# Easiest end-to-end recipe:
#
#   just demo-crdt-procs
#
# (creates two isolated XDG dirs, dials A from B, reaps them.)
# Step-by-step:
#
#   vosx space new --name a
#   vosx space up a --manifest examples/space-crdt-a.toml \
#     --listen /ip4/127.0.0.1/tcp/4811 &
#   # … then in another shell, run space-crdt-b.toml …
#
# `replication_id` defaults to "auto" =
# `blake2b(name || 0 || blob)` — both manifests reference the
# same actor by the same name, so they auto-share a CRDT group.
# `on_start` fires the inc once when each replica first boots.

space = "crdt-demo"
version = "0.1.0"

[[agent]]
name = "counter"
path = "actors/crdt-counter/target/riscv64em-javm/release/crdt_counter.elf"
consistency = "crdt"
on_start = [
  { msg = "inc" },
]
