# E2EE messaging demo, host A — see docs/messaging.md.
#
# One channel ("general") = two replicated PVM agents + the native
# messenger extension holding this node's MLS state:
#
#   msg-general-log  crdt   ciphertext envelope log (leaderless)
#   msg-general-ctl  raft¹  sequenced MLS commit chain
#   messenger        .so    encrypt/decrypt at the edge, poll tick
#
# ¹ raft linearizes the MLS commit chain (and msg-directory's
#   single-use KeyPackage claims) across nodes, so any member can
#   commit — a follower's write is forwarded to the group's
#   leader. Voters come from the registry's members table: the
#   creator is enrolled at `space new`; enroll each joining node
#   (and grant its NODE peer the member tier — a forwarded write
#   carries the forwarding node's authority):
#
#     vosx space members msg-demo add-node <node-peer-id>
#     vosx space role msg-demo grant <node-peer-id> read
#
#   The node peer id is in the joiner's `.endpoint` file (NOT
#   `vosx whoami`, which is the operator's client identity).
#
# Pair with `space-msg-b.toml` in another vosx process. Easiest
# end-to-end recipe:
#
#   just demo-msg-procs
#
# Step-by-step (host A):
#
#   cargo build -p vosx -p messenger-extension
#   just build-msg-actors
#   vosx space new --name msg-demo
#   vosx space up msg-demo --manifest examples/space-msg-a.toml \
#     --listen /ip4/127.0.0.1/tcp/4821 &
#   vosx messenger register alice
#   vosx messenger create general
#   vosx messenger invite general <key_package hex from host B>
#   vosx messenger send general "hello"
#   vosx messenger history general
#
# `replication_id` defaults to "auto" = blake2b(name || 0 || blob);
# both manifests reference the same actors by the same names, so
# each agent pair auto-shares a replication group.

space = "msg-demo"
version = "0.1.0"

[[agent]]
name = "msg-general-log"
path = "../actors/msg-log/target/riscv64em-javm/release/msg_log.elf"
consistency = "crdt"

[[agent]]
name = "msg-general-ctl"
path = "../actors/msg-ctl/target/riscv64em-javm/release/msg_ctl.elf"
consistency = "raft"

[[agent]]
name = "msg-directory"
path = "../actors/msg-directory/target/riscv64em-javm/release/msg_directory.elf"
consistency = "raft"

[[extension]]
name = "messenger"
path = "../target/debug/libmessenger_extension.so"
tick_ms = 500
# The messenger relays the operator's caller to the channel actors;
# member is the ceiling the post/commit handlers need, and the
# `msg-*` prefix also covers channels created at runtime (their
# agent names don't exist at manifest time). `space-registry:admin`
# lets an admin's `messenger create` install a new channel's agent
# pair; registry lookups (`resolve`) are ungated and need no cap.
intra_caps = ["msg-*:member", "space-registry:admin"]
