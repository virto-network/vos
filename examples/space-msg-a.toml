# E2EE messaging demo, host A. Run both sides with `just demo-msg-procs`;
# manual step-by-step in docs/messaging.md. Pair with space-msg-b.toml.

space = "msg-demo"
version = "0.1.0"

# One channel ("general") = a crdt envelope log + a raft MLS commit chain,
# plus the per-space directory and the chronos randomness beacon (raft).
[[agent]]
name = "msg-general-log"
path = "../actors/msg-log/target/riscv64em-javm/release/msg_log.elf"
consistency = "crdt"

[[agent]]
name = "msg-general-ctl"
path = "../actors/msg-ctl/target/riscv64em-javm/release/msg_ctl.elf"
consistency = "raft"

[[agent]]
name = "msg-directory"
path = "../actors/msg-directory/target/riscv64em-javm/release/msg_directory.elf"
consistency = "raft"

[[agent]]
name = "chronos"
path = "../actors/chronos/target/riscv64em-javm/release/chronos.elf"
consistency = "raft"

[[extension]]
name = "messenger"
path = "../target/debug/libmessenger_extension.so"
tick_ms = 500
# member: ceiling for post/commit (and `msg-*` covers runtime-created
# channels); admin: lets `messenger create` install a channel's agents.
intra_caps = ["msg-*:member", "space-registry:admin"]
