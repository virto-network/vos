# Cross-node CRDT replication demo manifest.
#
# Run two vosx daemons over the same logical space and the
# crdt-counter actor will auto-replicate between them.
#
# The cleanest two-process recipe is the just recipe at the
# repo root:
#
#   just demo-crdt-procs
#
# (creates isolated XDG dirs for each node, dials A from B, and
# reaps them.) For step-by-step:
#
#   # terminal A
#   vosx space new --name a
#   vosx space up a --manifest examples/space-crdt.toml \
#     --listen /ip4/127.0.0.1/tcp/4811 &
#   vosx space info a   # copy the bootnode hint <space-id>@<addr>
#
#   # terminal B (paste the bootnode hint)
#   vosx space join "<bootnode-hint>" --name b
#   vosx space up b --manifest examples/space-crdt.toml \
#     --connect /ip4/127.0.0.1/tcp/4811/p2p/<peer-id> &
#
# `replication_id` defaults to `auto`, which derives it from
# `blake2b(name || 0x00 || blob)`. Both processes load the same
# blob with the same name, so they automatically share the
# replication group without any manual coordination.

space = "crdt-demo"
version = "0.1.0"

[[agent]]
name = "counter"
path = "actors/crdt-counter/target/riscv64em-javm/release/crdt_counter.elf"
consistency = "crdt"
# replication_id is "auto" by default — derived from the blob.
# Set explicitly only if two replicas ship different blobs of
# the "same" actor and need to share state anyway:
#   replication_id = "<64 hex chars>"
# Or opt out entirely:
#   replication_id = "off"
