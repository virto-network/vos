[package]
name = "echo-wasm"
version = "0.1.0"
edition = "2024"

[workspace]


[features]
default = ["wasm"]
wasm = ["vos/wasm"]

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "worker", "wasm"))']

[lib]
crate-type = ["cdylib"]

[dependencies]
vos = { path = "../../../vos", default-features = false, features = ["wasm-bootstrap"] }

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
