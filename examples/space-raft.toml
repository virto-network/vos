# Three-node Raft consensus demo.
#
# Unlike CRDT replication (eventually consistent, no leader), Raft
# gives every state-changing dispatch strict linearizability: the
# leader appends to the log, blocks until a majority of followers
# acknowledge, and only then replies to the client. Reads from a
# follower are NOT linearizable in this build (clients should
# target the leader); CRDT is still the right pick when reads from
# any replica are needed.
#
# ## Bootstrap
#
# One node bootstraps solo with `vosx up`; the others join with
# `vosx join <bootnode>`. Membership is tracked dynamically via
# joint consensus — no manual `node_prefix` harvesting.
#
#   # Bootstrap node:
#   vosx up examples/space-raft.toml \
#       --data-dir /tmp/raft-a \
#       --listen /ip4/127.0.0.1/tcp/4811 &
#
#   # Note the printed bootnode multiaddr from the startup log
#   # (looks like /ip4/127.0.0.1/tcp/4811/p2p/12D3...).
#
#   # Joiner B:
#   vosx join /ip4/127.0.0.1/tcp/4811/p2p/<bootnode-peer-id> \
#       --data-dir /tmp/raft-b \
#       --listen /ip4/127.0.0.1/tcp/4812 &
#
#   # Joiner C:
#   vosx join /ip4/127.0.0.1/tcp/4811/p2p/<bootnode-peer-id> \
#       --data-dir /tmp/raft-c \
#       --listen /ip4/127.0.0.1/tcp/4813 &
#
#   # Drive the actor from any replica's `vosx call` — only the
#   # leader will accept writes; followers reply with
#   # `Unreachable` until they're elected.
#   vosx call ledger.inc 1
#
# Each node logs its discovered membership on startup; once
# `vosx join` returns, the cluster is up to N voters and a
# subsequent `vosx ps` shows everyone connected.

space = "raft-demo"
version = "0.1.0"

[[agent]]
name = "ledger"
path = "actors/crdt-counter/target/riscv64em-javm/release/crdt-counter.elf"
consistency = "raft"
# `replication_id` defaults to "auto" =
# `blake2b(name || 0 || blob)` — every replica that names this
# actor "ledger" with the same actor binary auto-shares a Raft
# group, regardless of which addresses they dialed.
