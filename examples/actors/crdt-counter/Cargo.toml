[workspace]

[package]
name = "crdt-counter"
version = "0.1.0"
edition = "2024"

[features]
# When set on a host consumer, `#[messages]` emits the typed
# `CrdtCounterClient` (see registry/Cargo.toml for the same
# convention). Off for the riscv64 actor build.
default = []
host = []

# `#[messages]` emits cfg gates for features defined on the `vos`
# crate (worker, wasm). Declare them so cargo's check-cfg lint
# doesn't flag every macro expansion.
[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "worker", "wasm"))']

[lib]
name = "crdt_counter"
path = "src/lib.rs"

[[bin]]
name = "crdt-counter"
path = "src/main.rs"

[dependencies]
vos = { path = "../../../crates/vos", default-features = false, features = ["macros", "service"] }
# Registry actor's lib portion: types + the macro-generated
# `RegistryActorClient` (used by `whois` below). No `host`
# feature — that would pull `VosNode` and host-side blake2b
# into a riscv64 build, which doesn't make sense.
registry = { path = "../../../crates/actors/registry" }

[profile.release]
opt-level = "s"
lto = true
panic = "abort"
