[package]
name = "example-actors"
version = "0.1.0"
edition = "2024"

[dependencies]
pvx-abi = { path = "../../crates/pvx-abi" }
pvx-scape = { path = "../../crates/pvx-scape" }
pvx-actors = { path = "../../crates/pvx-actors", features = ["pvx-actors-macros"] }

[profile.release]
opt-level = "s"
lto = true
panic = "abort"

[[bin]]
name = "greeter"
path = "src/bin/greeter.rs"

[[bin]]
name = "counter"
path = "src/bin/counter.rs"

[[bin]]
name = "fizzbuzz"
path = "src/bin/fizzbuzz.rs"
