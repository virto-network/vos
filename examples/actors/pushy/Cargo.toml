[workspace]

[package]
name = "pushy"
version = "0.1.0"
edition = "2024"

[features]
default = ["bin"]
bin = []

[lib]
name = "pushy"
crate-type = ["rlib", "cdylib"]
path = "src/lib.rs"

[[bin]]
name = "pushy"
path = "src/main.rs"
required-features = ["bin"]

[target.'cfg(target_arch = "riscv64")'.dependencies]
vos = { path = "../../../crates/vos", default-features = false, features = ["macros", "service"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
vos = { path = "../../../crates/vos", default-features = false, features = ["macros", "wasm-bootstrap"] }

[target.'cfg(not(any(target_arch = "riscv64", target_arch = "wasm32")))'.dependencies]
vos = { path = "../../../crates/vos", default-features = false, features = ["macros", "worker"] }

[profile.release]
opt-level = "s"
lto = true
panic = "abort"
