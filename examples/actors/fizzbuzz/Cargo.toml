[workspace]

[package]
name = "fizzbuzz"
version = "0.1.0"
edition = "2024"

[features]
# `bin` enables PVM entry-point emission. Default-on so a plain
# `cargo build` (or `cargo actor`) produces an actor ELF; consumers
# depending on this crate as a Ref source turn it off via
# `default-features = false` so no entries land in their link.
default = ["bin"]
bin = []

[lib]
crate-type = ["rlib", "cdylib"]

[target.'cfg(target_arch = "riscv64")'.dependencies]
vos = { path = "../../../vos", default-features = false, features = ["macros", "service"] }


[target.'cfg(target_arch = "wasm32")'.dependencies]
vos = { path = "../../../vos", default-features = false, features = ["macros", "wasm-bootstrap"] }


[target.'cfg(not(any(target_arch = "riscv64", target_arch = "wasm32")))'.dependencies]
vos = { path = "../../../vos", default-features = false, features = ["macros", "extension"] }


[profile.release]
opt-level = "s"
lto = true
panic = "abort"
