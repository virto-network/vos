# Cross-node CRDT demo, host B. See space-crdt-a.toml for context.
#
# Run (after starting host A):
#   vosx space join <space-id>@/ip4/127.0.0.1/tcp/4811/p2p/<peer-a> --name b
#   vosx space up b --manifest examples/space-crdt-b.toml &

space = "crdt-demo"
version = "0.1.0"

[[agent]]
name = "counter"
path = "actors/crdt-counter/target/riscv64em-javm/release/crdt_counter.elf"
consistency = "crdt"
on_start = [
  { msg = "inc" },
]
