# Kunekt.toml — example space manifest.
#
# One vosx instance runs one space. Other vosx instances pointed at
# the same manifest will be able to join as peers when the libp2p
# layer lands; today this still runs as a standalone node.
#
# Run with:
#   vosx up examples/Kunekt.toml
#   vosx ls  examples/Kunekt.toml
#
# Per-instance config (libp2p identity, listen addrs, data dir)
# typically lives in a gitignored `Kunekt.local.toml` overlay so
# different operators can run the same space with their own
# `[node]` block.

# ── Space identity ────────────────────────────────────────────────
#
# Top-level keys define the space itself. There is no [space]
# wrapper.

space = "demo"
version = "0.1.0"

# Optional. When set, this space announces itself to the named
# hyperspace and inherits its registry transitively. A hyperspace
# is just another space whose agent provides = ["registry"]
# tracks the membership list. Standalone spaces leave this unset.
# hyperspace = "main-hub"

# ── Agents ────────────────────────────────────────────────────────
#
# Each [[agent]] is a deterministic PVM service running on this
# space's node. Agents can host child actors inline via `actors`.
#
# `consistency`:
#   ephemeral  — in-memory only (default)
#   local      — redb-backed
#   crdt       — merkle-CRDT (state + DAG + roots committed atomically;
#                effect logs recorded for cross-replica replay)
#
# `provides`: opt-in role tags. Other actors / operators address
# the agent by role rather than by local name. Future runtime will
# expose `@role` lookup in init values; today these are surfaced in
# the boot log and `vosx ls`.
#
# Either `path` (development) or `service` (registry lookup;
# requires the networking layer) — not both.

[[agent]]
name = "scheduler"
path = "agents/scheduler/target/riscv64em-javm/release/scheduler.elf"
consistency = "ephemeral"
# Cross-agent invoke is wired through the node — the scheduler can
# ctx.ask() each of its children. Names in `init.children` resolve
# to the corresponding actor's ServiceId at startup.
init = { children = ["greeter", "counter", "fizzbuzz"] }

# Child actors. Each one gets its own ServiceId on the node and
# inherits the parent agent's consistency. They're independent PVM
# services; the parent invokes them via the cross-agent path.
actors = [
  { name = "greeter",  path = "actors/greeter/target/riscv64em-javm/release/greeter.elf" },
  { name = "counter",  path = "actors/counter/target/riscv64em-javm/release/counter.elf" },
  { name = "fizzbuzz", path = "actors/fizzbuzz/target/riscv64em-javm/release/fizzbuzz.elf" },
]

# ── Extensions ───────────────────────────────────────────────────
#
# Native plugins (.so / .dylib) — the I/O surface of the space.
# PVM agents that need HTTP, the wall clock, the filesystem, or
# hardware access route through extensions via ctx.ask / ctx.tell.
# Each observed reply is captured in the calling actor's effect
# log so CRDT actors replay deterministically across replicas.

# [[extension]]
# name = "rate-oracle"
# path = "target/debug/librate_oracle.so"
# provides = ["rates"]
# init = { endpoint = "https://api.example.com" }

# ── Per-instance configuration ────────────────────────────────────
#
# The [node] section holds settings that vary per running instance.
# In practice, ship the manifest above without [node] and put
# operator-specific config in a gitignored Kunekt.local.toml
# overlay. CLI flags --data-dir / --no-persist take precedence.

# [node]
# identity = "auto"                       # libp2p keypair (reserved)
# listen   = ["/ip4/0.0.0.0/tcp/4001"]    # libp2p listen addrs (reserved)
# data_dir = "./data"                     # persistence dir
