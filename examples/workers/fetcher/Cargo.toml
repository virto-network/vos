[package]
name = "fetcher-worker"
version = "0.1.0"
edition = "2024"

[features]
# `bin` enables the cdylib's `vos_worker_*` extern-fn exports.
# `worker` is matched by `#[actor]` to emit `impl WorkerActor`
# (which unlocks `ctx.fetch(...)` etc.) and the dispatch glue.
# Both default-on so a plain `cargo build` produces a loadable
# worker .so; consumers depending on this crate as a Ref source
# turn them off via `default-features = false` so no symbols
# clash in their link.
default = ["bin", "worker"]
bin = []
worker = []

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "worker", "wasm"))']

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
vos = { path = "../../../crates/vos", default-features = false, features = ["worker"] }
