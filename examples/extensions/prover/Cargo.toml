[package]
name = "prover-extension"
version = "0.1.0"
edition = "2024"

# General-purpose host-side zkpvm prover + verifier. Any actor that
# exposes a `__VOS_WITNESS` buffer (via `vos::zk::witness_buffer!`) and
# binds its `(public, return)` with `vos::zk::bind_io` can be proved and
# verified here — the prover is PROGRAM-AGNOSTIC: it patches opaque
# witness bytes into the buffer, proves the trace, and composes STARK
# validity with the tagless io-binding. It carries no per-program crypto
# knowledge (no cipher-clerk / voucher types). A bridge dispatches
# `prove` / `verify` / `program_commitment` here by `program_id`.
#
# Lives as a native `.so` because zkpvm-verifier can't build for the PVM
# guest (javm -> blst C-build + workspace stwo feature inheritance), so
# in-actor verification isn't viable — see the general-prover plan.

[features]
default = ["bin", "extension"]
bin = []
extension = []
# Forward zkpvm's row-by-row constraint asserter (no FRI/blowup/commit, so
# far lighter than a full prove) for verifying large traces that OOM under
# `prove`. Test-only: `cargo test -p prover-extension --features debug-constraints`.
debug-constraints = ["zkpvm/debug-internals"]

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "extension", "wasm"))']

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
vos = { path = "../../../vos", default-features = false, features = ["extension"] }
# zkpvm prover (trace + prove_mobile) and the host-side standalone
# verifier. The cdylib re-exports only prove / verify / program_commitment.
zkpvm = { workspace = true }
zkpvm-verifier = { workspace = true }
# ELF -> PVM blob transpile. Pinned to match vos's grey rev (6075cec) —
# 6db1168 predates `fix(transpiler): handle SLT rd, x0, rs2 in the
# x0-as-rs1 op table`, which the kernel `apply_batch` balance-overflow
# check needs lowered (it emits SLT rd, x0, rs2). The fix is additive
# instruction handling (emits the existing `set_gt_s_imm` opcode), so the
# blob stays format-compatible with zkpvm's 6db1168 tracer.
grey-transpiler = { git = "https://github.com/olanod/jar.git", rev = "6075cec9989b5fe221051fb87be6664459a6148e" }
bincode = "1"
# Read an actor ELF's symbol table to locate `__VOS_WITNESS`.
object = { version = "0.36", default-features = false, features = ["std", "read_core", "elf"] }

[dev-dependencies]
# The prove/verify e2e test proves the voucher-check guest and builds its
# (Public, Secret) witness. cipher-clerk lives here ONLY for the test —
# the extension itself stays voucher-agnostic. Witness bytes are encoded
# with `vos::rkyv` so they match exactly what the guest decodes/rebinds.
cipher-clerk = { path = "/home/daniel/src/virto/cipher-clerk", default-features = false, features = [
    "viewing-keys",
    "voucher",
    "helpers",
] }
