[package]
name = "clerk-prover-extension"
version = "0.1.0"
edition = "2024"

# Host-side extension that produces and verifies zkpvm proofs for
# cipher-clerk Mode::External vouchers. clerk-bridge (the PVM actor)
# dispatches `verify_voucher_proof(public_bytes, proof_bytes)` here
# when it sees a Mode::External voucher; in-actor verification is
# blocked by zkpvm-verifier's PVM-build blockers (task #1 spike),
# so this lives as a native .so.

[features]
default = ["bin", "extension"]
bin = []
extension = []

[lints.rust.unexpected_cfgs]
level = "allow"
check-cfg = ['cfg(feature, values("pvm", "service", "extension", "wasm"))']

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
vos = { path = "../../../vos", default-features = false, features = ["extension"] }
# zkpvm prover + verifier — host-side only. The cdylib's symbol table
# stays small because the actor entry-points re-export only
# `prove_voucher` / `verify_voucher_proof` / `program_commitment`.
zkpvm = { workspace = true }
zkpvm-verifier = { workspace = true }
# Needed for the guest binary's PVM-blob parsing + interpreter
# tracing — same path the zkpvm test harness takes.
javm = { workspace = true }
grey-transpiler = { git = "ssh://git@github.com/olanod/jar.git", rev = "6db1168" }
bincode = "1"
blake2 = { version = "0.10", default-features = false, features = ["std"] }
# Parse the voucher-check ELF's symbol table to find WITNESS_BUFFER's
# address at runtime. `object` is the standard read-only ELF parser in
# the rust ecosystem; no_std-friendly but we're host-only here.
object = { version = "0.36", default-features = false, features = ["std", "read_core", "elf"] }
# cipher-clerk for the Public type that public_bytes() takes.  Host-
# side build pulls full dalek; size impact is tolerable for an
# extension that already links zkpvm.
cipher-clerk = { path = "/home/daniel/src/virto/cipher-clerk", default-features = false, features = [
    "viewing-keys",
    "voucher",
] }
