[package]
name = "vosx"
description = "Host CLI for VOS ‚Äî peer-to-peer OS for collaborative, replicated apps. Run actors on a deterministic PVM, manage spaces, replicate state via CRDT or Raft."
keywords = ["vos", "p2p", "actor", "crdt", "cli"]
categories = ["command-line-utilities", "network-programming", "wasm"]
version = "0.1.0"
edition = "2024"
authors = ["Daniel Olano <daniel@olanod.com>"]
# Ship the prebuilt space-registry blob inside the crate so
# `cargo install vosx` from crates.io has the actor available
# out of the box. The blob is regenerated from the local actor
# tree by `just refresh-bundled-registry`.
include = [
    "src/**/*",
    "tests/**/*",
    "build.rs",
    "Cargo.toml",
    "blobs/space_registry.elf",
    "blobs/dev_project.elf",
]

[dependencies]
vos = { path = "../vos", version = "0.1.0", features = ["std", "http", "storage", "network"] }
# `vosx zk pin` transpiles the provable ELF here and delegates the heavy
# zkpvm measurement to the prover extension's `measure_catalog` handler, so
# vosx pulls no zkpvm/stwo.
# Direct dep for ELF ‚Üí PVM blob conversion. vos uses it
# transitively but doesn't re-export, so vosx pulls its own.
# `version` is what crates.io resolves at publish time.
grey-transpiler = { git = "https://github.com/olanod/jar.git", rev = "ba1276acffa3e84f33cb90491e389280fd070a48", version = "0.1" }
# Per-space catalog of programs / agents / members. Source of
# truth that the new `space *` subcommands operate on.
space-registry = { path = "../actors/space-registry", version = "0.1.0", default-features = false }
# The per-space clock + verifiable-randomness service. The daemon
# feeds it from the raft leader (init/advance via Caller::System) and
# the typed `ChronosRef` / `AdvanceOutcome` / `MAX_SLOT_JUMP` ride along.
# `default-features = false` strips the PVM bin entry-point.
chronos = { path = "../actors/chronos", version = "0.1.0", default-features = false }
# ECVRF primitive (Phase D v1): each node derives a static VRF keypair from
# node.key and the leader's feeder enrols pubkeys + posts per-round reveals to
# the committee. no_std, pure software (host build).
vrf = { path = "../vrf" }
# The sandboxed nushell console engine backing `vosx space console`.
vos-shell = { path = "../vos-shell" }
# Wire types for the `vosx dev *` subcommands. The dev extension
# returns `HashResult` from `compile`/`publish`; the CLI decodes
# back the same type to surface status/hash to operators.
# `default-features = false` strips the PVM cdylib entry-points.
dev-project = { path = "../actors/dev-project", default-features = false }
# Content-addressed cache + IPFS resolver dependency for the
# blob store. Stays a thin dep ‚Äî no daemon required for `Path`
# and `Hash` sources, only `Cid` and `Url` resolution touch
# external services.
hex = "0.4"
# anyhow is the existing project's only convenience-error crate;
# the new `space *` commands return Result for clean error
# bubbling through the clap dispatcher.
anyhow = "1"
# Read the registry's genesis DAG root from its redb during
# `space new`. Mirrors the dev-dep usage in vos's
# elf_integration tests; vos uses redb internally but doesn't
# re-export it.
redb = "2"
# `kill -0` to detect stale endpoint files left by a crashed
# `space up` daemon.
libc = "0.2"
# OS entropy for the chronos beacon feed (the leader samples 32
# fresh bytes per advance; a draw failure skips the pass rather
# than ever feeding zero entropy).
getrandom = "0.2"

# CLI / serde
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
# UTC `created_at` formatting in spaces.toml. `formatting` for
# the `format` API; `macros` so the format-description literal
# is checked at compile time.
time = { version = "0.3", default-features = false, features = ["formatting", "macros"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Bridges the `log` facade (vos's actor-side `vos::log::*` calls
# such as the warnings inside `Context::resolve`) into tracing
# so they surface through the same subscriber.
tracing-log = "0.2"

# libp2p multiaddr parsing for `--listen` / `--connect`. The
# rest of the network plumbing is owned by `vos::network`.
libp2p = { version = "0.56", default-features = false, features = ["tcp", "yamux", "noise", "tokio", "mdns", "macros", "ping", "identify", "request-response", "gossipsub"] }
