[target.riscv64em-javm]
rustflags = [
    "-Zunstable-options",
    "-Zcrate-attr=no_std",
    "-Zcrate-attr=no_main",
    "-Aduplicate-macro-attributes",
    "-Aunused-attributes",
    # Canonical service identity must not depend on its checkout directory.
    "-Zremap-cwd-prefix=.",
    # Cargo derives crate metadata from absolute path-package identities.
    # Override it after Cargo's generated value so symbol hashes and linker
    # ordering remain stable when this protocol program is built elsewhere.
    "-Cmetadata=vos-service-v2",
]

[alias]
actor = "rustc --lib --crate-type bin -Zbuild-std=core,alloc,compiler_builtins -Zbuild-std-features=compiler-builtins-mem --release --target riscv64em-javm.json"

[unstable]
json-target-spec = true
