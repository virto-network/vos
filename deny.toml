# cargo-deny configuration. Run with:
#
#     cargo install cargo-deny
#     cargo deny check
#
# The four sub-checks (advisories / licenses / bans / sources) all run
# by default. Wire `cargo deny check` into CI before any release that
# leaves the trusted-internal-network bucket — without it, RustSec
# advisories on hyper / quinn / rustls / ring won't get caught.

[graph]
# Check every feature combination so feature-gated deps (e.g. our
# `http3` stack) are scanned too. Slower than the default, worth it.
all-features = true

[advisories]
version = 2
# Hard-fail on any RustSec advisory by default; manage exceptions
# with `ignore = ["RUSTSEC-XXXX-YYYY"]` when there's a documented
# reason and a tracking ticket.
ignore = []

[licenses]
version = 2
# Permissive set common to the Rust ecosystem. Add to this list only
# after legal review — every entry is a license the project ships.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "Zlib",
    "OpenSSL",
]
# Confidence floor for license auto-detection. 0.8 is the cargo-deny
# default; raising it would flag crates with non-canonical license
# text that we'd otherwise have to whitelist explicitly.
confidence-threshold = 0.8

[bans]
# Multiple versions of the same crate in the dep tree are common in
# Rust and rarely a real problem, but worth a heads-up at audit time.
multiple-versions = "warn"
# Wildcard versions in `[dependencies]` are a CI hazard — they let an
# upstream patch bump silently land in the lock file with the next
# `cargo update`.
wildcards = "deny"
# Allow our own `path = ".."` workspace deps to use wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "warn"
# We pull `javm` and `grey-transpiler` from a pinned commit in the
# `olanod/jar` repo — anything else from git should at least surface
# at audit time.
allow-git = ["https://github.com/olanod/jar.git"]
